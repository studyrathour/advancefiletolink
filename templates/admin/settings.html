<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Settings - File2Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">⚙️ Settings</h1>
            <a href="/admin/dashboard" class="px-4 py-2 rounded-lg bg-white/10 hover:bg-white/20">← Back</a>
        </div>

        <div class="glass rounded-xl p-6 mb-6">
            <h2 class="text-xl font-bold mb-6">💾 Storage Information</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white/5 rounded-lg p-4">
                    <p class="text-gray-400 text-sm">Total Files</p>
                    <p class="text-2xl font-bold mt-1">{{ stats.total_files }}</p>
                </div>
                <div class="bg-white/5 rounded-lg p-4">
                    <p class="text-gray-400 text-sm">Total Downloads</p>
                    <p class="text-2xl font-bold mt-1">{{ stats.total_downloads }}</p>
                </div>
                <div class="bg-white/5 rounded-lg p-4">
                    <p class="text-gray-400 text-sm">Storage Used</p>
                    <p class="text-2xl font-bold mt-1">--</p>
                </div>
            </div>
        </div>

        <div class="glass rounded-xl p-6 mb-6">
            <h2 class="text-xl font-bold mb-6">🔧 Configuration</h2>
            <div class="space-y-4">
                <div class="flex justify-between items-center py-3 border-b border-white/10">
                    <span>Admin Panel</span>
                    <span class="text-green-400">Enabled</span>
                </div>
                <div class="flex justify-between items-center py-3 border-b border-white/10">
                    <span>Bot Status</span>
                    <span class="text-green-400">Running</span>
                </div>
                <div class="flex justify-between items-center py-3 border-b border-white/10">
                    <span>Database</span>
                    <span class="text-green-400">Connected</span>
                </div>
            </div>
        </div>

        <div class="glass rounded-xl p-6">
            <h2 class="text-xl font-bold mb-6">🔐 Change Admin Password</h2>
            <form method="POST" action="/admin/settings/save">
                <div class="mb-4">
                    <label class="block text-sm text-gray-400 mb-2">New Password</label>
                    <input type="password" name="new_password"
                           class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white">
                </div>
                <button type="submit"
                        class="px-6 py-3 rounded-lg bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 font-semibold">
                    Update Password
                </button>
            </form>
        </div>
    </div>
</body>
</html>
