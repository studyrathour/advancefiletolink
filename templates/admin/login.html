<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - File2Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-md glass rounded-2xl p-8">
        <h1 class="text-2xl font-bold text-center mb-8">🔐 Admin Login</h1>

        <form method="POST" action="/admin/login">
            <div class="mb-4">
                <label class="block text-sm text-gray-400 mb-2">Email</label>
                <input type="email" name="email" required
                       class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white focus:outline-none focus:border-purple-500">
            </div>

            <div class="mb-6">
                <label class="block text-sm text-gray-400 mb-2">Password</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white focus:outline-none focus:border-purple-500">
            </div>

            <button type="submit"
                    class="w-full py-3 rounded-lg bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 font-semibold">
                Login
            </button>
        </form>

        <p class="mt-6 text-center text-gray-500 text-sm">
            <a href="/" class="text-purple-400 hover:text-purple-300">← Back to Home</a>
        </p>
    </div>
</body>
</html>
